<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zack Oliver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="noise"></div>

  <main>
    <header class="hero fade-in">
      <h1>Zack Oliver</h1>
      <p class="tagline">Customer success &amp; implementation leader. Builder of random things because I can't help myself.</p>
      <div class="hero-links">
        <a href="https://www.linkedin.com/in/zackoliver/" target="_blank" rel="noopener">LinkedIn</a>
        <span class="hero-links-dot">·</span>
        <a href="https://docs.google.com/document/d/1aJtQd6wI8IJJ_7-RnnhtE24-B9LiOI_OPEhXDsw5nb0/edit?tab=t.0" target="_blank" rel="noopener">Resume</a>
      </div>
    </header>

    <div class="deco-divider fade-in delay-1">
      <span></span>
    </div>

    <section class="projects fade-in delay-2">
      <h2>Projects</h2>

      <div class="library">

        <div class="spine-stack">

          <div class="spine" data-project="clt">
            <div class="spine-binding"></div>
            <div class="spine-body">
              <span class="spine-title">Charlotte Startup Index</span>
              <span class="spine-tag">Community</span>
            </div>
          </div>

          <div class="spine" data-project="kettlebell">
            <div class="spine-binding"></div>
            <div class="spine-body">
              <span class="spine-title">Kettlebell Genie</span>
              <span class="spine-tag">Fitness</span>
            </div>
          </div>

          <div class="spine" data-project="nombook">
            <div class="spine-binding"></div>
            <div class="spine-body">
              <span class="spine-title">NomBook</span>
              <span class="spine-tag">Cooking &amp; Lifestyle</span>
            </div>
          </div>

        </div>

        <div class="book-panel">
          <div class="panel-hint" id="panelHint">
            <span class="hint-arrow">←</span>
            <span class="hint-text">select a project</span>
          </div>
          <div class="panel-content" id="panelContent" style="display:none">
            <div class="panel-item" id="pTag"><span class="panel-tag"></span></div>
            <div class="panel-item" id="pTitle"><h3 class="panel-title"></h3></div>
            <div class="panel-item" id="pDesc"><p class="panel-desc"></p></div>
            <div class="panel-item" id="pStack"><div class="panel-stack"></div></div>
            <div class="panel-item" id="pLink">
              <a class="panel-link" href="#" target="_blank" rel="noopener">Visit Project ↗</a>
            </div>
          </div>
        </div>

      </div>
    </section>
  </main>

  <footer class="fade-in delay-2">
    <a href="https://github.com/zack0liver" target="_blank" rel="noopener">GitHub</a>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
